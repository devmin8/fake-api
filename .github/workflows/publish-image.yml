# Build the container and publish it to GitHub Container Registry (GHCR).
# Triggered manually ("Run workflow") — not on push — so releases are deliberate.
# The image lands at ghcr.io/<owner>/<repo>:<tag>.

name: Publish image to GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (also always tagged with the commit sha)"
        required: false
        default: latest

permissions:
  contents: read
  packages: write
  # Lets the build attach a signed SLSA provenance attestation (keyless, via the
  # workflow's OIDC identity) proving this image was built by this repo + commit.
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercases the repo path and derives tags/labels (the chosen tag + sha).
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach a SLSA provenance attestation + an SBOM to the pushed image.
          # This is the keyless "signing": consumers can verify the image really
          # came from this workflow, and see exactly what's inside it.
          provenance: true
          sbom: true

      # GHCR requires a lowercase image path; github.repository may contain caps.
      - name: Derive lowercase image ref
        id: img
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # Scan the image we just pushed (pinned by digest) and fail on fixable
      # CRITICAL/HIGH CVEs, so a known-vulnerable image doesn't go unnoticed.
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.33.0
        with:
          image-ref: ${{ steps.img.outputs.ref }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library
